client_id = "d630a13c32b5693677a53b751d1547be"
name = "RetailIQ_v2"
application_url = "https://retailiq-production-47a7.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request"]
  uri = "https://retailiq-production-47a7.up.railway.app/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/redact"]
  uri = "https://retailiq-production-47a7.up.railway.app/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = ["shop/redact"]
  uri = "https://retailiq-production-47a7.up.railway.app/webhooks/shop/redact"


[access_scopes]
scopes = "read_products"

[auth]
redirect_urls = [ "https://retailiq-production-47a7.up.railway.app/api/auth" ]
